name: Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to build
        required: true
        type: choice
        options:
          - master
          - develop/v1.6
          - feature/codex_1.6
          - feature/category-save-restore
        default: master

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Show build target
        shell: pwsh
        run: |
          git rev-parse --short HEAD
          git branch --show-current
          git status --short
          Get-ChildItem -Recurse -File | Select-Object FullName

      - name: Build Release
        shell: pwsh
        run: |
          .\build.cmd Release

      - name: Inspect release output
        if: always()
        shell: pwsh
        run: |
          if (Test-Path .\Release) {
            Get-ChildItem -Recurse .\Release | Select-Object FullName,Length
          } else {
            Write-Host "Release directory not found."
          }
          if (Test-Path .\Release\x64\csend.exe) {
            Write-Host "csend.exe exists."
          } else {
            Write-Host "csend.exe not found."
          }

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: csend-exe-${{ github.run_number }}
          path: Release\x64\csend.exe
          if-no-files-found: error
          retention-days: 14
